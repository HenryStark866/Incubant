# ============================================
# Variables de Entorno Requeridas en Render
# ============================================
#
# DATABASE_URL: postgresql://postgres:[PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
# DIRECT_URL: postgresql://postgres:[PASSWORD]@db.[PROJECT-REF].supabase.co:5432/postgres
# SESSION_SECRET: (generar valor aleatorio seguro)
# VITE_SUPABASE_URL: https://[PROJECT-REF].supabase.co
# VITE_SUPABASE_ANON_KEY: [tu-anon-key]
#
# ============================================

# ============================================
# Configuración de Base de Datos (Supabase)
# ============================================
#
# La aplicación usa Supabase como base de datos PostgreSQL.
# Asegúrate de:
#
# 1. Habilitar "Connection Pooling" en Supabase (Settings > Database)
# 2. Configurar el password de postgres
# 3. En "Allowed IPs", permitir acceso desde Render (0.0.0.0/0 para desarrollo)
#    O mejor: usar Supabase Transaction Pooler con pgbouncer
#
# ============================================
