<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Incubant Monitor</title>

    <!-- SEO & Description -->
    <meta name="description" content="Sistema de Gestión y Monitoreo - Antioqueña de Incubación S.A.S." />
    <meta name="theme-color" content="#f5a623" />

    <!-- Favicon -->
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="icon" href="/logo.png" sizes="any" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#f5a623" />

    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Incubant" />

    <!-- Mobile Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="Incubant" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#f5a623" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Preconnect to Supabase for performance -->
  <style>
    body { background-color: #0F172A; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    .splash { text-align: center; color: white; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .loader-ring { width: 48px; height: 48px; border: 4px solid #f5a62340; border-top: 4px solid #F5A623; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .logo-text { font-size: 24px; font-weight: 900; letter-spacing: -0.05em; color: #F5A623; }
  </style>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <div class="loader-ring"></div>
        <div class="logo-text">INCUBANT MONITOR</div>
        <div style="font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.2em;">Iniciando sistema...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
