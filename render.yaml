# ============================================
# Render Configuration
# ============================================
# Este archivo define la configuración para desplegar el backend en Render
#
# Pasos para desplegar:
# 1. Sube este repositorio a GitHub
# 2. En Render, crea un nuevo "Web Service"
# 3. Conecta tu repositorio de GitHub
# 4. Configura las variables de entorno (ver más abajo)
# 5. Deploy

services:
  - type: web
    name: incubant-backend
    env: node
    region: us-east-1 # Virginia (más cercano a Colombia)
    plan: starter
    branch: main

    # Build settings
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm run start

    # Health check
    healthCheckPath: /api/health

    # Environment variables (configurar en Render UI)
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoYnRpdmFlcHlod2ZkdnRwZmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTMsImV4cCI6MjA4OTg2MTQxM30.YaJzau2pASUSLmL7OVwqqTnp5M9Q6s3lQsXCbGw_W5M
      - key: GEMINI_API_KEY
